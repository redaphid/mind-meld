# Mindmeld - Unified Conversation Index
#
# Quick start:
#   1. Install Ollama (https://ollama.com/download)
#   2. Run: docker compose up -d
#   Models are pulled automatically on first sync.
#
# That's it! Paths auto-detect on macOS. Linux users: see .env.example for paths.

services:
  postgres:
    image: ghcr.io/redaphid/mindmeld-postgres:latest
    container_name: mindmeld-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mindmeld
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindmeld}
      POSTGRES_DB: conversations
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - mindmeld-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindmeld -d conversations"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: mindmeld-chroma
    restart: unless-stopped
    environment:
      CHROMA_SERVER_AUTHN_PROVIDER: ""
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
      CHROMA_SERVER_CORS_ALLOW_ORIGINS: '["*"]'
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - mindmeld-chroma:/data
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8000"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NOTE: the `sync` worker no longer runs in Docker on macOS. Docker Desktop's
  # container network proxy (gvisor/vpnkit) backpressures Ollama's response
  # stream, inflating chunk summaries from ~3s to ~30s. It now runs as a HOST
  # process via scripts/sync-host.sh (launchd: com.hypnodroid.mindmeld-sync),
  # reaching Ollama over the fast host->tunnel path and Postgres/Chroma via their
  # published ports. On a Linux host where Ollama is local, restore this service.

  centroid-compute:
    image: ghcr.io/redaphid/mindmeld-centroids:latest
    container_name: mindmeld-centroids
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindmeld}
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBEDDING_URL: ${OLLAMA_EMBEDDING_URL:-http://host.docker.internal:21434}
      OLLAMA_MAX_CONCURRENCY: ${OLLAMA_MAX_CONCURRENCY:-1}
      CENTROID_INTERVAL_SECONDS: ${CENTROID_INTERVAL_SECONDS:-25200}

  warmup-filter:
    image: ghcr.io/redaphid/mindmeld-warmups:latest
    container_name: mindmeld-warmups
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindmeld}
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      WARMUP_INTERVAL_SECONDS: ${WARMUP_INTERVAL_SECONDS:-21600}

  mcp:
    image: ghcr.io/redaphid/mindmeld-mcp:latest
    container_name: mindmeld-mcp
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      chroma:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mindmeld}
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBEDDING_URL: ${OLLAMA_EMBEDDING_URL:-http://host.docker.internal:21434}
      OLLAMA_MAX_CONCURRENCY: ${OLLAMA_MAX_CONCURRENCY:-1}
      MCP_PORT: 3000
    ports:
      - "${MCP_HTTP_PORT:-3847}:3000"

  # Optional: Cloudflare tunnel for remote access
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: mindmeld-cloudflared
    restart: unless-stopped
    depends_on:
      - mcp
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    profiles:
      - tunnel

volumes:
  mindmeld-postgres:
  mindmeld-chroma:

networks:
  default:
    name: mindmeld-network
